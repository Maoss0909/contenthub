version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: contenthub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: contenthub
      POSTGRES_PASSWORD: contenthub123
      POSTGRES_DB: contenthub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: contenthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: contenthub-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    container_name: contenthub-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/contenthub --ignore-existing;
      mc anonymous set download myminio/contenthub;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
